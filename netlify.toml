# Excerpt — Netlify Deployment Configuration
# Frontend: Next.js 14 (apps/web) — All pages statically generated

[build]
  base    = "apps/web"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION             = "20"
  NEXT_TELEMETRY_DISABLED  = "1"
  NPM_FLAGS                = "--legacy-peer-deps"

# Next.js plugin — handles routing and static/SSR pages correctly on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers (moved from next.config.js to avoid unnecessary lambda invocations)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
