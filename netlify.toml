# Excerpt — Netlify Deployment Configuration
# Frontend: Next.js 14 static export (out/ directory)
# NO serverless functions — pure CDN-served static site

[build]
  base    = "apps/web"
  command = "npm install && npm run build"
  # next.config.js uses output:'export' which writes to out/
  publish = "out"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS               = "--legacy-peer-deps"

# SPA-style routing — all routes served by index.html fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers at CDN edge (no lambda needed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
