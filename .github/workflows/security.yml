name: Security DevSecOps Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  validate:
    name: Validate Build & Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile workers and APIs (tsc)
        run: |
          npx tsc -b apps/api apps/web || true
          npx tsc --noEmit --project apps/api/tsconfig.json || true
          npx tsc --noEmit --project apps/web/tsconfig.json || true

      - name: Validate Production Environment Configuration
        run: npx tsx scripts/validate-env.ts

  codeql:
    name: CodeQL Semantic Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          python3 -m pip install semgrep
          semgrep ci --sarif --output=semgrep.sarif || true
        env:
          SEMGREP_RULES: p/default p/owasp-top-ten p/typescript

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm audit
        run: npm audit --audit-level=high

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
        with:
          scan-args: |-
            -r
            --skip-git
            ./

  containers:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build local image for scanning
        run: docker build -t excerpt-api:local -f Dockerfile.render .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'excerpt-api:local'
          format: 'sarif'
          output: 'trivy.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy.sarif'
          category: trivy

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dry Run Docker Build
        run: docker build -f Dockerfile.render .

  migrations:
    name: Supabase Migration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
      - name: Verify Migrations
        run: |
          supabase db lint || echo "Lint warnings found"
          supabase migration list || echo "Could not list migrations (requires linked project)"

  security-summary:
    name: Consolidate Artifacts
    needs: [validate, codeql, semgrep, secrets, dependencies, containers, docker-build, migrations]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: echo "All security pipelines executed. Check individual job runs for specific SARIF and artifact uploads."
