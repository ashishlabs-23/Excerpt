name: Build and Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Compilation & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting & linting
        run: |
          npm run lint --if-present
          npm run format:check --if-present

      - name: Run unit tests
        run: npm test --if-present

      - name: Compile typescript (No Emit)
        run: |
          npx tsc -b apps/api apps/web || true
          npx tsc --noEmit --project apps/api/tsconfig.json || true
          npx tsc --noEmit --project apps/web/tsconfig.json || true
